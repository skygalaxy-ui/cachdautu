name: Next.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci

      - name: Type Checking (TypeScript)
        run: npx tsc --noEmit

      - name: Build Check (Next.js)
        # Bắt lỗi build (ví dụ như sai config, trang lỗi syntax)
        run: npm run build
