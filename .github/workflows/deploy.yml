name: Deploy Next.js to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Deploy via SSH to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # Load NVM (Node Version Manager) if installed to ensure npm works
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # Go to app directory
            cd ~/cachdautu
            
            # Quy trình Pull an toàn bạo chúa: Huỷ bỏ mọi thay đổi lặt vặt trên VPS, đè code chuẩn từ GitHub lên rập khuôn 100%
            git fetch --all
            git reset --hard origin/main
            
            # Install dependencies and build
            npm install
            npm run build
            
            # Restart PM2 process
            pm2 restart cachdautu --update-env
