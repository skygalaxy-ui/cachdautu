name: Deploy Next.js to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          # Thêm các biến môi trường cần thiết để Build (Next.js yêu cầu có env lúc build)
          NEXT_PUBLIC_SUPABASE_URL: "https://pbxpjmklrkkwatdvacap.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_difW1C728CGH7Hgr1g9FOg_QdP0NtFD"
          
      - name: Prepare deployment package
        run: |
          tar -czf deploy.tar.gz .next public package.json package-lock.json next.config.js tailwind.config.js postcss.config.js

      - name: Copy files via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "deploy.tar.gz"
          target: "/tmp/"

      - name: Extract and Restart PM2 on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            cd ~/cachdautu
            
            # Giải nén đè lên bản cũ
            tar -xzf /tmp/deploy.tar.gz -C ~/cachdautu
            rm /tmp/deploy.tar.gz
            
            # Cài đặt các gói production (cực kỳ nhẹ, không gây tốn RAM)
            npm ci --omit=dev
            
            # Khởi động lại ứng dụng
            pm2 restart cachdautu --update-env
